#
# GitHub workflow for publishing snapshot artifacts
#
# This workflow publishes snapshots to:
# - GitHub Packages (Maven artifacts)
# - Maven Central Snapshots
# - GitHub Releases (XDK snapshot release)
# - GitHub Releases (optional IntelliJ plugin snapshot ZIP)
#
# Triggered by verify_commit workflow when:
# - Running on master branch (automatic)
# - Manually run with test-publishing=true (testing)
# Can also be triggered manually via workflow_dispatch for testing.
#
name: Publish Snapshots

permissions:
    contents: write
    packages: write
    actions: read

on:
    # Triggered explicitly by verify_commit workflow (on master or when test-publishing=true)
    # Can also be manually triggered for testing
    workflow_dispatch:
        inputs:
            ci-run-id:
                description: 'CI run ID to download artifact from (leave empty to skip artifact download)'
                required: false
            publish-xdk-snapshots:
                description: 'Publish Maven and XDK GitHub snapshot artifacts'
                required: false
                default: 'true'
            publish-intellij-plugin:
                description: 'Also build and publish the IntelliJ plugin snapshot ZIP'
                required: false
                default: 'false'
            extra-gradle-options:
                description: 'Extra Gradle options to pass to the publish steps'
                required: false

# Concurrency settings: ensure only one publish runs at a time to avoid upload conflicts
# Queue multiple triggers instead of cancelling in-progress uploads
concurrency:
    group: publish-snapshots
    cancel-in-progress: false

jobs:
    publish-snapshots:
        name: Publish snapshot artifacts
        if: ${{ github.event.inputs.publish-xdk-snapshots != 'false' }}
        runs-on: ubuntu-latest

        steps:
            - name: Fetch Sources
              uses: actions/checkout@v6
              with:
                  fetch-depth: 1
                  show-progress: true

            - name: Setup XVM Project
              id: versions
              uses: ./.github/actions/setup-xvm-project
              with:
                  setup-build: true
                  cache-read-only: true  # Read-only since CI build already populated cache
                  enable-debug: false

            - name: Validate snapshot version
              shell: bash
              run: |
                  VERSION="${{ steps.versions.outputs.xdk-version }}"
                  if [[ "$VERSION" != *-SNAPSHOT ]]; then
                      echo "❌ ERROR: Cannot publish snapshots for non-SNAPSHOT version"
                      echo ""
                      echo "Current version: $VERSION"
                      echo ""
                      echo "This workflow only publishes SNAPSHOT versions."
                      echo "For release versions, use the publish-release workflow instead."
                      echo ""
                      exit 1
                  fi
                  echo "✅ Validated snapshot version: $VERSION"

            - name: Determine commit and run ID
              id: commit
              shell: bash
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  # Use CI run ID from input if provided
                  if [ -n "${{ github.event.inputs.ci-run-id }}" ]; then
                      RUN_ID="${{ github.event.inputs.ci-run-id }}"
                      # Get commit from the specified run
                      GH_COMMIT=$(gh api /repos/${{ github.repository }}/actions/runs/$RUN_ID --jq '.head_sha')
                      echo "📌 Using CI run from input: $RUN_ID (commit: $GH_COMMIT)"
                      echo "has-artifact=true" >> $GITHUB_OUTPUT
                  # Manual trigger without run-id
                  else
                      GH_COMMIT="${{ github.sha }}"
                      echo "📌 Manual trigger - commit: $GH_COMMIT"
                      echo "⚠️  No CI run-id provided"
                      echo "⚠️  Will publish Maven snapshots but skip GitHub release"
                      echo "has-artifact=false" >> $GITHUB_OUTPUT
                  fi
                  echo "commit=$GH_COMMIT" >> $GITHUB_OUTPUT
                  echo "run-id=$RUN_ID" >> $GITHUB_OUTPUT

            - name: Download XDK artifact from CI
              if: steps.commit.outputs.has-artifact == 'true'
              id: artifact
              uses: ./.github/actions/download-ci-artifact
              with:
                  run-id: ${{ steps.commit.outputs.run-id }}
                  commit: ${{ steps.commit.outputs.commit }}
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  repository: ${{ github.repository }}
                  output-path: ./artifacts

            - name: Publish Maven snapshots
              env:
                  # GitHub CLI (used for GitHub API operations)
                  GITHUB_ACTOR: ${{ github.actor }}
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  # GitHub Packages credentials (Gradle properties for Maven publishing)
                  ORG_GRADLE_PROJECT_githubUsername: ${{ github.actor }}
                  ORG_GRADLE_PROJECT_githubPassword: ${{ secrets.GITHUB_TOKEN }}
                  # Gradle Plugin Portal credentials
                  ORG_GRADLE_PROJECT_gradle_publish_key: ${{ secrets.ORG_XTCLANG_GRADLE_PLUGIN_PORTAL_PUBLISH_KEY }}
                  ORG_GRADLE_PROJECT_gradle_publish_secret: ${{ secrets.ORG_XTCLANG_GRADLE_PLUGIN_PORTAL_PUBLISH_SECRET }}
                  # Maven Central credentials
                  ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.ORG_XTCLANG_MAVEN_CENTRAL_USERNAME }}
                  ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.ORG_XTCLANG_MAVEN_CENTRAL_PASSWORD }}
                  # Signing credentials
                  ORG_GRADLE_PROJECT_signing_keyId: ${{ secrets.ORG_XTCLANG_SIGNING_KEY_ID }}
                  ORG_GRADLE_PROJECT_signing_password: ${{ secrets.ORG_XTCLANG_SIGNING_PASSWORD }}
                  ORG_GRADLE_PROJECT_signing_key: ${{ secrets.ORG_XTCLANG_SIGNING_KEY }}
                  # SNAPSHOT versions automatically publish to GitHub Packages + Maven Central Snapshots
                  # Gradle Plugin Portal is automatically skipped (doesn't accept snapshots)
                  GRADLE_OPTS: ${{ steps.versions.outputs.gradle-jvm-opts }}
              run: |
                  echo "📦 Publishing Maven snapshot artifacts to GitHub Packages and Maven Central..."
                  echo "   (please note that gradlePluginPortal is skipped, since does not support SNAPSHOT versions.)"
                  ./gradlew ${{ steps.versions.outputs.gradle-options }} publish
                  echo "✅ Maven snapshots published"

            - name: Clean up old XDK package versions (keep 50 newest)
              if: success()
              uses: actions/delete-package-versions@v5
              with:
                  package-name: 'org.xtclang.xdk'
                  package-type: 'maven'
                  min-versions-to-keep: 30
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Clean up old Plugin package versions (keep 50 newest)
              if: success()
              uses: actions/delete-package-versions@v5
              with:
                  package-name: 'org.xtclang.xtc-plugin'
                  package-type: 'maven'
                  min-versions-to-keep: 30
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Clean up old Plugin Marker package versions (keep 50 newest)
              if: success()
              uses: actions/delete-package-versions@v5
              with:
                  package-name: 'org.xtclang.xtc-plugin.org.xtclang.xtc-plugin.gradle.plugin'
                  package-type: 'maven'
                  min-versions-to-keep: 30
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Publish to GitHub snapshot release
              if: success() && steps.commit.outputs.has-artifact == 'true'
              uses: ./.github/actions/publish-github-release
              with:
                  artifact-path: ${{ steps.artifact.outputs.artifact-path }}
                  xdk-version: ${{ steps.versions.outputs.xdk-version }}
                  commit: ${{ steps.commit.outputs.commit }}
                  repo: ${{ github.repository }}
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  release-type: snapshot

            - name: Summary
              if: success()
              shell: bash
              run: |
                  echo "### ✅ Snapshots Published" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "- **Version:** ${{ steps.versions.outputs.xdk-version }}" >> $GITHUB_STEP_SUMMARY
                  echo "- **Commit:** ${{ steps.commit.outputs.commit }}" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "**Published to:**" >> $GITHUB_STEP_SUMMARY
                  echo "- ✅ GitHub Packages (Maven artifacts)" >> $GITHUB_STEP_SUMMARY
                  echo "- ✅ Maven Central Snapshots" >> $GITHUB_STEP_SUMMARY
                  if [ "${{ steps.commit.outputs.has-artifact }}" = "true" ]; then
                      echo "- ✅ GitHub Releases (xdk-snapshots)" >> $GITHUB_STEP_SUMMARY
                  else
                      echo "- ⏭️ GitHub Releases (skipped - manual trigger)" >> $GITHUB_STEP_SUMMARY
                  fi
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "**Maven artifacts:**" >> $GITHUB_STEP_SUMMARY
                  echo "- XDK distribution" >> $GITHUB_STEP_SUMMARY
                  echo "- javatools JAR" >> $GITHUB_STEP_SUMMARY
                  echo "- Gradle plugin" >> $GITHUB_STEP_SUMMARY

    publish-intellij-plugin-snapshot:
        name: Publish IntelliJ plugin snapshot
        if: ${{ github.event.inputs.publish-intellij-plugin == 'true' }}
        runs-on: ubuntu-latest

        steps:
            - name: Determine source CI run and commit
              id: commit
              shell: bash
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  if [ -n "${{ github.event.inputs.ci-run-id }}" ]; then
                      RUN_ID="${{ github.event.inputs.ci-run-id }}"
                      GH_COMMIT=$(gh api /repos/${{ github.repository }}/actions/runs/$RUN_ID --jq '.head_sha')
                      echo "📌 Using CI run from input: $RUN_ID (commit: $GH_COMMIT)"
                  else
                      echo "❌ ERROR: ci-run-id is required for IntelliJ plugin snapshot publication"
                      echo "This workflow now promotes the CI-built plugin artifact instead of rebuilding from source."
                      exit 1
                  fi
                  echo "run-id=$RUN_ID" >> $GITHUB_OUTPUT
                  echo "commit=$GH_COMMIT" >> $GITHUB_OUTPUT

            - name: Download IntelliJ plugin artifact from CI
              uses: actions/download-artifact@v4
              with:
                  name: intellij-plugin-dist-${{ steps.commit.outputs.commit }}
                  path: ./artifacts/intellij-plugin
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  repository: ${{ github.repository }}
                  run-id: ${{ steps.commit.outputs.run-id }}

            - name: Validate IntelliJ plugin artifact
              id: artifact
              shell: bash
              run: |
                  ARTIFACT_ROOT="$PWD/artifacts/intellij-plugin"
                  METADATA_FILE="$ARTIFACT_ROOT/intellij-plugin-metadata.json"

                  if [ ! -f "$METADATA_FILE" ]; then
                      echo "❌ ERROR: IntelliJ plugin metadata file not found"
                      find "$PWD/artifacts/intellij-plugin" -maxdepth 4 -type f | sed -n '1,120p' || true
                      exit 1
                  fi

                  ZIP_FILE=$(find "$ARTIFACT_ROOT" -maxdepth 1 -name "*.zip" | head -1)
                  CHECKSUM_FILE="$ARTIFACT_ROOT/SHA256SUMS.txt"

                  if [ -z "$ZIP_FILE" ] || [ ! -f "$CHECKSUM_FILE" ]; then
                      echo "❌ ERROR: IntelliJ plugin artifact bundle is incomplete"
                      find "$ARTIFACT_ROOT" -maxdepth 3 -type f | sed -n '1,120p' || true
                      exit 1
                  fi

                  BASE_VERSION=$(jq -r '.baseVersion' "$METADATA_FILE")
                  PUBLISH_VERSION=$(jq -r '.publishVersion' "$METADATA_FILE")
                  RELEASE_CHANNEL=$(jq -r '.releaseChannel' "$METADATA_FILE")
                  XML_ID=$(jq -r '.xmlId' "$METADATA_FILE")

                  echo "artifact-root=$ARTIFACT_ROOT" >> $GITHUB_OUTPUT
                  echo "zip-file=$ZIP_FILE" >> $GITHUB_OUTPUT
                  echo "checksum-file=$CHECKSUM_FILE" >> $GITHUB_OUTPUT
                  echo "metadata-file=$METADATA_FILE" >> $GITHUB_OUTPUT
                  echo "base-version=$BASE_VERSION" >> $GITHUB_OUTPUT
                  echo "publish-version=$PUBLISH_VERSION" >> $GITHUB_OUTPUT
                  echo "release-channel=$RELEASE_CHANNEL" >> $GITHUB_OUTPUT
                  echo "xml-id=$XML_ID" >> $GITHUB_OUTPUT

                  echo "✅ IntelliJ plugin artifact validated"
                  echo "  Base version:    $BASE_VERSION"
                  echo "  Publish version: $PUBLISH_VERSION"
                  echo "  Channel:         $RELEASE_CHANNEL"
                  echo "  XML ID:          $XML_ID"
                  echo "  ZIP:             $(basename "$ZIP_FILE")"

            - name: Publish IntelliJ plugin to JetBrains Marketplace alpha
              shell: bash
              env:
                  JETBRAINS_TOKEN: ${{ secrets.JETBRAINS_TOKEN }}
              run: |
                  if [ -z "$JETBRAINS_TOKEN" ]; then
                      echo "❌ ERROR: JETBRAINS_TOKEN secret is not available to this workflow."
                      echo "Check GitHub Actions secret scope for the xtclang organization secret:"
                      echo "  - Secret name: JETBRAINS_TOKEN"
                      echo "  - Repository access must include: xtclang/xvm"
                      exit 1
                  fi
                  echo "✅ JETBRAINS_TOKEN is available"

            - name: Publish IntelliJ plugin to JetBrains Marketplace alpha
              shell: bash
              env:
                  JETBRAINS_TOKEN: ${{ secrets.JETBRAINS_TOKEN }}
              run: |
                  ZIP_FILE="${{ steps.artifact.outputs.zip-file }}"
                  XML_ID="${{ steps.artifact.outputs.xml-id }}"
                  CHANNEL="${{ steps.artifact.outputs.release-channel }}"
                  RESPONSE_FILE="$RUNNER_TEMP/jetbrains-upload-response.json"

                  echo "🚀 Publishing IntelliJ plugin to JetBrains Marketplace alpha..."
                  if curl --fail-with-body --silent --show-error \
                    -H "Authorization: Bearer $JETBRAINS_TOKEN" \
                    -F "xmlId=$XML_ID" \
                    -F "channel=$CHANNEL" \
                    -F "file=@$ZIP_FILE" \
                    https://plugins.jetbrains.com/api/updates/upload \
                    >"$RESPONSE_FILE"; then
                      echo "✅ JetBrains Marketplace upload completed"
                  else
                      STATUS=$?
                      RESPONSE=$(cat "$RESPONSE_FILE" 2>/dev/null || true)
                      if [[ "$RESPONSE" == *"already contains version"* ]]; then
                          echo "ℹ️ JetBrains Marketplace already has this exact plugin version in channel '$CHANNEL'."
                          echo "ℹ️ Continuing so GitHub release assets can still be updated for this CI artifact."
                      else
                          echo "❌ JetBrains Marketplace upload failed"
                          [ -n "$RESPONSE" ] && echo "$RESPONSE"
                          exit "$STATUS"
                      fi
                  fi

            - name: Prepare release assets
              id: prepare
              shell: bash
              run: |
                  VERSION="${{ steps.artifact.outputs.publish-version }}"
                  PLUGIN_ZIP="${{ steps.artifact.outputs.zip-file }}"
                  CHECKSUM_FILE="${{ steps.artifact.outputs.checksum-file }}"
                  PUBLIC_ZIP="xtc-intellij-plugin-${VERSION}.zip"
                  PUBLIC_SUMS="${PUBLIC_ZIP}.sha256"

                  cp "$PLUGIN_ZIP" "$PUBLIC_ZIP"
                  awk '{print $1}' "$CHECKSUM_FILE" | {
                      read -r SUM
                      printf "%s  %s\n" "$SUM" "$PUBLIC_ZIP" > "$PUBLIC_SUMS"
                  }

                  echo "asset-name=$PUBLIC_ZIP" >> $GITHUB_OUTPUT
                  echo "checksum-name=$PUBLIC_SUMS" >> $GITHUB_OUTPUT

                  echo "📦 Prepared release assets:"
                  ls -lh "$PUBLIC_ZIP" "$PUBLIC_SUMS"

            - name: Publish IntelliJ plugin snapshot release
              shell: bash
              env:
                  # NOTE: prefer the xtclang org-level PAT for GitHub release management because
                  # the workflow GITHUB_TOKEN can be denied release creation in downstream runs.
                  # Secret name: ORG_XTCLANG_GITHUB_RELEASE_TOKEN
                  GH_TOKEN: ${{ secrets.ORG_XTCLANG_GITHUB_RELEASE_TOKEN }}
              run: |
                  if [ -z "$GH_TOKEN" ]; then
                      echo "❌ ERROR: ORG_XTCLANG_GITHUB_RELEASE_TOKEN is required for IntelliJ GitHub release publication."
                      exit 1
                  fi

                  RELEASE_TAG="intellij-plugin-snapshots"
                  VERSION="${{ steps.artifact.outputs.publish-version }}"
                  COMMIT="${{ steps.commit.outputs.commit }}"
                  ASSET_NAME="${{ steps.prepare.outputs.asset-name }}"
                  CHECKSUM_NAME="${{ steps.prepare.outputs.checksum-name }}"
                  BUILD_DATE=$(date -u +"%Y-%m-%d %H:%M:%S UTC")

                  RELEASE_NOTES="**Automated IntelliJ plugin snapshot builds**

                  Latest snapshot version: **${VERSION}**
                  Build commit: \`${COMMIT}\`
                  Build date: ${BUILD_DATE}

                  Install in IntelliJ IDEA via Settings -> Plugins -> gear icon -> Install Plugin from Disk...

                  Download the \`${ASSET_NAME}\` asset below."

                  echo "📥 Publishing IntelliJ plugin snapshot to: $RELEASE_TAG"

                  if gh release view "$RELEASE_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
                      echo "Updating existing IntelliJ plugin snapshot release..."
                      gh release edit "$RELEASE_TAG" \
                          --repo "${{ github.repository }}" \
                          --title "XTC IntelliJ Plugin Snapshots" \
                          --notes "$RELEASE_NOTES" \
                          --prerelease \
                          --latest=false
                      gh release upload "$RELEASE_TAG" \
                          "$ASSET_NAME" \
                          "$CHECKSUM_NAME" \
                          --repo "${{ github.repository }}" \
                          --clobber
                  else
                      echo "Creating IntelliJ plugin snapshot release..."
                      gh release create "$RELEASE_TAG" \
                          "$ASSET_NAME" \
                          "$CHECKSUM_NAME" \
                          --repo "${{ github.repository }}" \
                          --title "XTC IntelliJ Plugin Snapshots" \
                          --notes "$RELEASE_NOTES" \
                          --prerelease \
                          --latest=false \
                          --target "$COMMIT"
                  fi

                  echo "✅ IntelliJ plugin snapshot published"

            - name: Summary
              if: success()
              shell: bash
              run: |
                  echo "### ✅ IntelliJ Plugin Snapshot Published" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "- **Base version:** ${{ steps.artifact.outputs.base-version }}" >> $GITHUB_STEP_SUMMARY
                  echo "- **Published version:** ${{ steps.artifact.outputs.publish-version }}" >> $GITHUB_STEP_SUMMARY
                  echo "- **Commit:** ${{ steps.commit.outputs.commit }}" >> $GITHUB_STEP_SUMMARY
                  echo "- **Release tag:** intellij-plugin-snapshots" >> $GITHUB_STEP_SUMMARY
                  echo "- **Marketplace channel:** ${{ steps.artifact.outputs.release-channel }}" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "**Assets:**" >> $GITHUB_STEP_SUMMARY
                  echo "- \`${{ steps.prepare.outputs.asset-name }}\`" >> $GITHUB_STEP_SUMMARY
                  echo "- \`${{ steps.prepare.outputs.checksum-name }}\`" >> $GITHUB_STEP_SUMMARY
