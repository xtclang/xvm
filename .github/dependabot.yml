# Dependabot configuration for dependabot inspections for the repo on GitHub.
#
# ─── Local validation ────────────────────────────────────────────────────────
# Schema validation (catches typos, wrong keys, invalid values) can be run
# locally without pushing. Two options:
#
#   1. check-jsonschema (recommended — uses the official SchemaStore schema
#      bundled with the tool, so it knows about `directories:` + globs):
#        uvx check-jsonschema --builtin-schema vendor.dependabot .github/dependabot.yml
#        # or, if you prefer pipx:
#        pipx install check-jsonschema
#        check-jsonschema --builtin-schema vendor.dependabot .github/dependabot.yml
#
#   2. yamllint (YAML syntax only — no semantic checks):
#        brew install yamllint   # or: pipx install yamllint
#        yamllint .github/dependabot.yml
#
# Behavior validation (does Dependabot actually find the files under each
# configured directory?) is not doable offline — GitHub's Dependabot engine
# runs server-side. To verify:
#
#   - Push the change, then visit
#     https://github.com/xtclang/xvm/network/updates  (Insights → Dependency
#     graph → Dependabot) and watch the next scheduled run, or click
#     "Check for updates" on any ecosystem row to force one immediately.
#   - Or run the repo's `Validate Dependabot Configuration` workflow:
#        gh workflow run validate-dependabot.yml
# ─────────────────────────────────────────────────────────────────────────────

version: 2
updates:
    # Enable version updates for GitHub Actions.
    #
    # `directories:` (plural, glob-capable — added to the Dependabot schema in
    # 2024) scans both the default workflow location and every composite
    # action under .github/actions/*. Without the glob entry, `uses:` pins
    # inside composite action.yml files (e.g. actions/setup-java in
    # setup-xvm-project/action.yml) would NOT be tracked — only the `uses:`
    # lines in .github/workflows/*.yml would.
    - package-ecosystem: "github-actions"
      directories:
          - "/"
          - "/.github/actions/**"
      schedule:
          interval: "weekly"
          day: "saturday"
          time: "06:00"
      open-pull-requests-limit: 5
      commit-message:
          prefix: "ci"
          include: "scope"

    # Enable version updates for Docker
    - package-ecosystem: "docker"
      directory: "/docker"
      schedule:
          interval: "weekly"
          day: "saturday"
          time: "06:00"
      open-pull-requests-limit: 5
      commit-message:
          prefix: "docker"
          include: "scope"

    # Enable version and security updates for the VS Code extension npm
    # workspace. This keeps package.json and package-lock.json current for
    # extension runtime, package, lint, and test dependencies.
    - package-ecosystem: "npm"
      directory: "/lang/vscode-extension"
      schedule:
          interval: "weekly"
          day: "saturday"
          time: "06:00"
      open-pull-requests-limit: 5
      groups:
          vscode-extension-npm:
              patterns:
                  - "*"
          vscode-extension-npm-security:
              applies-to: "security-updates"
              patterns:
                  - "*"
      ignore:
          # Major JavaScript toolchain changes need explicit compatibility
          # review instead of an unattended grouped Dependabot PR.
          - dependency-name: "*"
            update-types:
                - "version-update:semver-major"
          # VS Code API typings must match engines.vscode. Bump this only
          # alongside an intentional minimum VS Code version change.
          - dependency-name: "@types/vscode"
            update-types:
                - "version-update:semver-major"
                - "version-update:semver-minor"
                - "version-update:semver-patch"
          # Node typings must stay on the Node line used by the Gradle-pinned
          # extension build runtime and esbuild target.
          - dependency-name: "@types/node"
            update-types:
                - "version-update:semver-major"
      commit-message:
          prefix: "deps"
          include: "scope"

    # Enable version updates for Gradle dependencies.
    #
    # Dependabot can update Gradle manifest files and the standard version
    # catalog, but GitHub does not run Gradle to discover security exposure.
    # Gradle security alerts/security-update PRs need resolved dependency
    # graph data from .github/workflows/dependency-submission.yml.
    #
    # NOTE: Ignore org.xtclang.* dependencies as they use
    # dynamic version resolution from version.properties.
    #
    - package-ecosystem: "gradle"
      directory: "/"
      schedule:
          interval: "weekly"
          day: "saturday"
          time: "06:00"
      open-pull-requests-limit: 3
      groups:
          # Group all version updates into a single PR.
          gradle-dependencies:
              patterns:
                  - "*"
          # Group security updates separately once GitHub has dependency graph
          # data for the resolved Gradle graph.
          gradle-security:
              applies-to: "security-updates"
              patterns:
                  - "*"
      commit-message:
          prefix: "deps"
          include: "scope"
      ignore:
          # Gradle wrapper/tooling upgrades are handled manually because they
          # require regenerating wrapper artifacts and keeping CI metadata in sync.
          - dependency-name: "gradle"
          # Ignore XDK internal dependencies
          # (use dynamic versioning)
          - dependency-name: "org.xtclang.*"
          # JLine affects interactive terminal behavior; review minor/major
          # bumps manually instead of taking them in grouped dependency PRs.
          - dependency-name: "org.jline:jline"
            update-types:
                - "version-update:semver-major"
                - "version-update:semver-minor"
          # Ignore major updates (too risky, require manual review). Minor and
          # patch updates stay enabled so security/maintenance releases like
          # Bouncy Castle 1.82 -> 1.84 are proposed automatically.
          - dependency-name: "*"
            update-types: ["version-update:semver-major"]
